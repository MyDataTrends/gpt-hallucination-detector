name: Package Extension

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
    
    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build

    - name: Create Release Zip
      run: |
        mkdir -p package/src/assets
        mkdir -p package/dist
        
        # Copy manifest
        cp manifest.json package/
        
        # Copy compiled code
        cp dist/content.js package/dist/
        
        # Copy styles
        cp src/assets/styles.css package/src/assets/
        
        # Copy docs
        cp README.md package/
        
        # Zip it
        cd package
        zip -r ../gpt-hallucination-detector.zip .
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: extension-package
        path: gpt-hallucination-detector.zip
